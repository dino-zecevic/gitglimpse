name: 'gitglimpse PR Context'
description: 'Automatically generate structured PR descriptions from your git history'
branding:
  icon: 'git-commit'
  color: 'yellow'

inputs:
  github-token:
    description: 'GitHub token for posting comments'
    required: true
    default: '${{ github.token }}'
  base-branch:
    description: 'Base branch to compare against'
    required: false
    default: 'main'
  context-mode:
    description: 'Context detail level: commits, diffs, or both'
    required: false
    default: 'both'
  filter-noise:
    description: 'Filter noise commits (merges, lock files, formatting)'
    required: false
    default: 'true'
  llm-provider:
    description: 'LLM provider for richer summaries: none, openai, anthropic, gemini'
    required: false
    default: 'none'
  llm-api-key:
    description: 'API key for LLM provider (pass as a GitHub secret)'
    required: false
    default: ''
  llm-model:
    description: 'LLM model name (e.g. gpt-4o-mini, claude-sonnet-4-20250514, gemini-2.5-flash)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install gitglimpse
      shell: bash
      run: pip install "gitglimpse[llm]"

    - name: Fetch base branch
      shell: bash
      run: |
        git fetch origin "${{ inputs.base-branch }}":"${{ inputs.base-branch }}" 2>/dev/null || true

    - name: Generate PR context
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.llm-api-key }}
        ANTHROPIC_API_KEY: ${{ inputs.llm-api-key }}
        GEMINI_API_KEY: ${{ inputs.llm-api-key }}
      run: |
        NOISE_FLAG=""
        if [ "${{ inputs.filter-noise }}" = "false" ]; then
          NOISE_FLAG="--no-filter-noise"
        fi

        LLM_FLAGS=""
        if [ "${{ inputs.llm-provider }}" != "none" ] && [ -n "${{ inputs.llm-api-key }}" ]; then
          echo "Using LLM provider: ${{ inputs.llm-provider }} with model: ${{ inputs.llm-model }}"
          LLM_FLAGS="--provider ${{ inputs.llm-provider }} --model ${{ inputs.llm-model }}"
        else
          echo "No LLM configured — using template mode"
        fi

        glimpse pr --json --base "${{ inputs.base-branch }}" --context "${{ inputs.context-mode }}" --skip-setup $NOISE_FLAG $LLM_FLAGS 2>&1 | tee /tmp/glimpse-output.txt
        EXIT_CODE=${PIPESTATUS[0]}
        if [ $EXIT_CODE -ne 0 ]; then
          echo "glimpse pr failed, using fallback"
          echo '{"tasks":[],"summary":"No context available"}' > /tmp/glimpse-pr.json
        else
          cp /tmp/glimpse-output.txt /tmp/glimpse-pr.json
        fi

    - name: Post PR comment
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        python3 << 'EOF'
        import json
        import os
        import urllib.request

        # Read the PR context
        with open('/tmp/glimpse-pr.json') as f:
            data = json.load(f)

        # Build the comment body
        lines = []
        lines.append("## PR Context (gitglimpse)")
        lines.append("")

        # Summary
        if data.get("summary"):
            lines.append(f"**Summary:** {data['summary']}")
            lines.append("")

        # Ticket
        if data.get("ticket"):
            lines.append(f"**Ticket:** `{data['ticket']}`")
            lines.append("")

        # Tasks
        if data.get("tasks"):
            lines.append("**Changes:**")
            for task in data["tasks"]:
                ticket_part = f" ({task['ticket']})" if task.get("ticket") else ""
                effort = round(task.get("estimated_minutes", 0) / 60, 1)
                lines.append(f"- {task['summary']}{ticket_part} (~{effort}h)")
            lines.append("")

        # Files
        if data.get("files_changed"):
            files = ", ".join(data["files_changed"][:10])
            if len(data["files_changed"]) > 10:
                files += f" (+{len(data['files_changed']) - 10} more)"
            lines.append(f"**Files:** {files}")
            lines.append("")

        # Stats
        stats_parts = []
        if data.get("total_commits"):
            stats_parts.append(f"{data['total_commits']} commits")
        if data.get("total_insertions") is not None:
            stats_parts.append(f"+{data['total_insertions']} / -{data.get('total_deletions', 0)}")
        if data.get("estimated_hours"):
            stats_parts.append(f"~{data['estimated_hours']}h estimated effort")
        if stats_parts:
            lines.append(f"**Stats:** {' · '.join(stats_parts)}")
            lines.append("")

        # Filtered commits note
        if data.get("filtered_commits", 0) > 0:
            lines.append(f"*{data['filtered_commits']} noise commits filtered (merges, formatting, dependencies)*")
            lines.append("")

        lines.append("---")
        lines.append("*Generated by [gitglimpse](https://github.com/dino-zecevic/gitglimpse)*")

        comment_body = "\n".join(lines)

        # Post to GitHub
        repo = os.environ.get("GITHUB_REPOSITORY")
        pr_number = None
        event_path = os.environ.get("GITHUB_EVENT_PATH")
        if event_path:
            with open(event_path) as f:
                event = json.load(f)
                pr_number = event.get("pull_request", {}).get("number") or event.get("number")

        if not pr_number:
            print("No PR number found, skipping comment")
            exit(0)

        # Check for existing gitglimpse comment and update instead of creating new
        url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
        headers = {
            "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
            "Accept": "application/vnd.github.v3+json",
            "Content-Type": "application/json"
        }

        # List existing comments to find previous gitglimpse comment
        req = urllib.request.Request(url, headers=headers)
        with urllib.request.urlopen(req) as resp:
            comments = json.loads(resp.read())

        existing_comment_id = None
        for comment in comments:
            if "PR Context (gitglimpse)" in comment.get("body", ""):
                existing_comment_id = comment["id"]
                break

        payload = json.dumps({"body": comment_body}).encode()

        if existing_comment_id:
            # Update existing comment
            update_url = f"https://api.github.com/repos/{repo}/issues/comments/{existing_comment_id}"
            req = urllib.request.Request(update_url, data=payload, headers=headers, method="PATCH")
        else:
            # Create new comment
            req = urllib.request.Request(url, data=payload, headers=headers)

        with urllib.request.urlopen(req) as resp:
            print(f"Comment {'updated' if existing_comment_id else 'posted'} on PR #{pr_number}")

        EOF
